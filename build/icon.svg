<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!--
    Rune app icon.

    macOS Big Sur+ template:
    - 1024×1024 canvas
    - App tile centered at 824×824 (≈100 px safe margin)
    - Tile corner radius 185 px
    This is what every standard Mac app icon uses — dropping it into
    the Dock gives the same optical size as Finder, Preview, etc.

    Windows and Linux use a full-bleed square; the centered tile just
    looks like a floating rounded-square on those platforms, which is
    fine and consistent with the macOS look.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2f2f2f"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
  </defs>

  <!-- Tile: 824×824 centered, 100 px margin, rounded -->
  <rect x="100" y="100" width="824" height="824" rx="185" ry="185" fill="url(#bg)"/>

  <!-- Raidho (ᚱ) rune in white, bold strokes for legibility at 16×16 -->
  <g stroke="#ffffff" stroke-width="76" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Vertical stem -->
    <line x1="360" y1="260" x2="360" y2="764"/>
    <!-- Top diagonal up to the peak -->
    <line x1="360" y1="260" x2="650" y2="440"/>
    <!-- Return to stem, forming the triangle -->
    <line x1="650" y1="440" x2="360" y2="528"/>
    <!-- Lower leg -->
    <line x1="360" y1="528" x2="680" y2="764"/>
  </g>
</svg>
