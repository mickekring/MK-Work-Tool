appId: com.rune.app
productName: Rune
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    # Rune reads/writes files inside a user-chosen vault folder and
    # copies dragged attachments. Documents/Downloads usage descriptions
    # surface TCC prompts on first access. We do NOT use camera/mic,
    # so those entitlements are intentionally omitted — fewer declared
    # capabilities = less of an attack surface and smoother App Store
    # review if that ever happens.
    - NSDocumentsFolderUsageDescription: Rune reads and writes your markdown notes inside the vault folder you select.
    - NSDownloadsFolderUsageDescription: Rune lets you drop files from Downloads into a note as attachments.
  notarize: false
  target:
    - target: dmg
      arch:
        - x64
        - arm64
dmg:
  artifactName: ${name}-${version}-${arch}.${ext}
win:
  target:
    - target: nsis
      arch:
        - x64
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
linux:
  target:
    - target: AppImage
      arch:
        - x64
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
# No publish provider configured. Auto-updates would require a real
# update server URL AND properly-signed builds; enabling this with a
# placeholder URL is a supply-chain hazard waiting to happen.
